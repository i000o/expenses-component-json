<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="dist/output.css"> 
  <script src="js/script.js"></script>
  <title>Expenses chart component</title>
</head>
<body class="bg-[#f9ece1] flex justify-center items-center min-h-screen">
  <div class="min-w-[60vw] flex flex-col text-left gap-[1em] mt-10 mb-10 ml-5 mr-5"> <!-- wrapper -->
     <div class="flex flex-row justify-between bg-[#ec775f] rounded-xl p-5 text-[#ffffff]"> <!-- top section showing MY BALANCE-->
    <div> 
      <h1 class="font-extralight text-[0.8em]"> 
        My balance
      </h1>
      <p class="font-bold text-[1.2em]"> 
        $921.48
      </p>
    </div>  
    <img src="images/logo.svg"> 
  </div>
    <div class="bg-[#ffffff] rounded-[12px] p-5 h-auto"> <!-- second card showing graph-->
      <p class="font-bold text-[1.4em] text-[#382314] tracking-wide mb-20"> 
        Spending - Last 7 days
      </p>
      <div class="flex flex-row justify-center items-center text-center gap-[2.5em] font-light text-[#93867b] text-[0.7em] w-[100%]"> 
        <p>mon</p>
        <div class="chart"></div>
        <p>tue</p>
        <div class="chart"></div>
        <p>wed</p>
        <div class="chart"></div>
        <p>thu</p>
        <div class="chart"></div>
        <p>fri</p>
        <div class="chart"></div>
        <p>sat</p>
        <div class="chart"></div>
        <p>sun</p>
        <div class="chart"></div>
      </div>
      <hr class="text-[#f9ece1] mt-5 mb-5">
      <p class="text-[#93867b] text-[0.9em]"> 
      Total this month
      </p>
      <div class="flex flex-row justify-between items-center"> 
        <p class="text-[#382314] font-bold h-[100%] text-[1.8em]"> 
        $478.33
        </p>
        <div class="text-right"> 
          <p class="font-bold text-[#382314] mb-[-3px] text-[0.88em]"> 
            +2.4%
          </p>
          <p class="text-[#93867b text-[0.9em] text-[#93867b]"> 
          from last month
          </p>
        </div>
      </div>
    </div>
  </div>
  <!-- <footer class="attribution">

    Coded by <a href="#">Your Name Here</a>.
  </footer> -->
</body>
</html>
